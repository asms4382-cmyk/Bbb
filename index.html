<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARKADAŞ - Otonom Yapay Zeka</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
   
    <!-- Yüz Tespiti İçin Gerekli Kütüphaneler -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface"></script>
   
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: manipulation; }
        #eyeCanvas { display: block; width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }
        #startScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50; color: #00ffff; }
        .btn-start { background-color: #00ffff; color: #000; transition: all 0.3s; box-shadow: 0 0 20px rgba(0, 255, 255, 0.5); cursor: pointer; border: none; outline: none; }
        .btn-start:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(0, 255, 255, 0.8); }
        .interactive { pointer-events: auto; }
        #magicMenu { opacity: 0; transform: translateY(20px); pointer-events: none; transition: 0.3s; }
        #magicMenu.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
       
        .loader {
            border: 4px solid rgba(0, 255, 255, 0.2);
            border-top: 4px solid #00ffff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Konuşma (Dokun ve Bırak) Butonu */
        #btnTalk {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 150;
            width: 80px; height: 80px; border-radius: 50%;
            background: linear-gradient(135deg, #00ffff, #0088ff);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.6);
            border: 4px solid rgba(255,255,255,0.2);
            color: black; font-size: 32px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s;
            user-select: none; -webkit-user-select: none;
        }
        #btnTalk:active {
            transform: translateX(-50%) scale(0.9);
        }
        #btnTalk.active-talk {
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.9), inset 0 0 20px rgba(0,0,0,0.3);
            background: linear-gradient(135deg, #00ffaa, #00cc66);
            animation: pulse-green 1s infinite alternate;
        }
        #btnTalk.thinking {
            background: linear-gradient(135deg, #ffaa00, #cc6600);
            box-shadow: 0 0 30px rgba(255, 170, 0, 0.6);
            pointer-events: none;
            animation: pulse-orange 1s infinite alternate;
        }
        @keyframes pulse-green { 0% { opacity: 0.8; transform: translateX(-50%) scale(1); } 100% { opacity: 1; transform: translateX(-50%) scale(1.05); } }
        @keyframes pulse-orange { 0% { opacity: 0.8; transform: translateX(-50%) scale(1); } 100% { opacity: 1; transform: translateX(-50%) scale(1.05); } }
    </style>
</head>
<body>

    <!-- Kontrol Menüsü -->
    <div class="absolute top-4 left-4 z-[100] flex gap-2 bg-black/50 p-2 rounded-2xl backdrop-blur-md border border-cyan-900/50 interactive">
        <button id="btnFullscreen" class="text-gray-400 hover:text-cyan-400 p-2 transition-colors" title="Tam Ekran"><i class="fa-solid fa-expand text-2xl"></i></button>
        <button id="btnNewTab" class="text-gray-400 hover:text-cyan-400 p-2 transition-colors" title="Yeni Sekmede Aç (Ayna Modu)"><i class="fa-solid fa-arrow-up-right-from-square text-2xl"></i></button>
        <div class="w-px h-8 bg-gray-600/50 my-auto mx-1"></div>
        <button id="btnToggleCam" class="text-gray-400 hover:text-cyan-400 p-2 transition-colors" title="Kamerayı Ekranda Göster/Gizle"><i class="fa-solid fa-video text-2xl"></i></button>
        <button id="btnSwitchDevice" class="hidden text-gray-400 hover:text-cyan-400 p-2 transition-colors" title="Kamera Değiştir"><i class="fa-solid fa-camera-rotate text-2xl"></i></button>
        <button id="btnTakePhoto" class="text-gray-400 hover:text-cyan-400 p-2 transition-colors" title="Anlık Fotoğraf Çek ve Yorumla"><i class="fa-solid fa-camera text-2xl"></i></button>
        <button id="btnRealPhotoSearch" class="text-gray-400 hover:text-cyan-400 p-2 transition-colors" title="İnternetten Gerçek Fotoğraf Bul"><i class="fa-solid fa-image text-2xl"></i></button>
    </div>

    <!-- Başlangıç Ekranı -->
    <div id="startScreen">
        <i class="fa-solid fa-robot text-6xl mb-4 animate-pulse"></i>
        <h1 class="text-3xl font-bold mb-4 text-center">ARKADAŞ Asistan</h1>
        <p class="text-cyan-500 mb-8 text-center max-w-md px-4">Sistemi başlatmak için tıklayın.</p>
        <button id="btnStart" class="btn-start font-bold py-3 px-8 rounded-full text-xl mb-4">Sistemi Başlat</button>
        <div id="loadingIndicator" class="hidden flex-col items-center gap-3 text-center">
            <div class="loader"></div>
            <p id="loadingText" class="text-cyan-200 text-sm">Modüller Hazırlanıyor...</p>
        </div>
        <div id="errorBox" class="hidden text-red-400 mt-4 text-center font-semibold bg-red-900/30 p-4 rounded-xl border border-red-500/50 max-w-md mx-4"></div>
    </div>

    <canvas id="eyeCanvas"></canvas>
    <video id="webcam" autoplay playsinline muted class="hidden fixed bottom-6 left-6 w-32 md:w-48 rounded-xl border-2 border-cyan-500 shadow-[0_0_20px_rgba(0,255,255,0.4)] z-50 object-cover" style="transform: scaleX(-1);"></video>

    <!-- Resim Gösterme Alanı -->
    <div id="imageDisplay" class="hidden absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-40 bg-black/90 p-6 rounded-3xl border-2 border-cyan-500/50 shadow-[0_0_50px_rgba(0,255,255,0.3)] flex-col items-center justify-center min-w-[300px] min-h-[200px] max-w-[90vw] max-h-[85vh] interactive">
        <button onclick="closeImage()" class="absolute -top-4 -right-4 bg-red-600 text-white rounded-full w-12 h-12 flex items-center justify-center hover:scale-110 transition-transform shadow-[0_0_15px_rgba(220,38,38,0.6)] cursor-pointer z-50">
            <i class="fa-solid fa-xmark text-2xl"></i>
        </button>
        <div class="loader mb-2" id="imageLoader"></div>
        <div id="imageGeneratingText" class="text-cyan-400 text-sm font-semibold mt-2 animate-pulse">Görsel hazırlanıyor...</div>
        <div id="imageErrorText" class="hidden text-red-400 text-center font-semibold mt-2">Resim oluşturulamadı.<br>Lütfen tekrar isteyin.</div>
        <img id="displayedImage" src="" class="max-w-full max-h-[75vh] rounded-2xl hidden object-contain transition-opacity duration-500">
    </div>

    <!-- Gerçek Fotoğraf Arama Modalı -->
    <div id="photoSearchModal" class="hidden absolute inset-0 z-[200] bg-black/80 flex items-center justify-center p-4 interactive">
        <div class="bg-gray-900 border border-cyan-500 rounded-2xl p-6 w-full max-w-sm shadow-[0_0_30px_rgba(0,255,255,0.2)]">
            <h3 class="text-cyan-400 text-lg font-semibold mb-4"><i class="fa-solid fa-magnifying-glass mr-2"></i>Hangi gerçek fotoğrafı görmek istiyorsun?</h3>
            <input type="text" id="photoSearchInput" class="w-full bg-black border border-cyan-800 text-white rounded-lg p-3 mb-4 focus:outline-none focus:border-cyan-400" placeholder="Örn: aslan, eyfel kulesi, araba">
            <div class="flex justify-end gap-3">
                <button id="btnCancelPhotoSearch" class="px-4 py-2 text-gray-400 hover:text-white transition-colors">İptal</button>
                <button id="btnSubmitPhotoSearch" class="px-4 py-2 bg-cyan-600 hover:bg-cyan-500 text-white rounded-lg transition-colors shadow-[0_0_10px_rgba(0,255,255,0.3)]">Bul</button>
            </div>
        </div>
    </div>

    <!-- Etkileşim UI Katmanı -->
    <div id="uiLayer" class="absolute bottom-0 left-0 w-full h-full z-20 hidden pointer-events-none">
        
        <!-- TEK TIKLA KONUŞ BUTONU -->
        <button id="btnTalk" class="interactive" title="Dokun ve Konuş">
            <i class="fa-solid fa-microphone"></i>
        </button>

        <div id="magicMenu" class="flex flex-col gap-4 mb-4 items-center absolute bottom-36 right-6 origin-bottom-right pointer-events-none interactive">
            <button onclick="triggerGemini('Okul öncesi çocukların kaba motor becerilerini geliştirecek, evde oynanabilen, hareketli ve hayal gücünü çalıştıran 1 dakikalık kısa bir oyun öner.', false)" class="group flex flex-col items-center">
                <div class="w-14 h-14 rounded-full bg-purple-500/90 flex items-center justify-center text-2xl shadow-[0_0_20px_rgba(168,85,247,0.6)] border-2 border-purple-200 cursor-pointer">⚽</div>
            </button>
           
            <button onclick="triggerGemini('Okul öncesi (4-6 yaş) çocukların bilişsel gelişimine uygun; hayvanlarla ilgili çok kolay, eğlenceli ve kafiyeli bir bilmece sor.', false)" class="group flex flex-col items-center">
                <div class="w-14 h-14 rounded-full bg-indigo-500/90 flex items-center justify-center text-2xl shadow-[0_0_20px_rgba(99,102,241,0.6)] border-2 border-indigo-200 cursor-pointer">❓</div>
            </button>

            <button onclick="triggerGemini('Şu an kamerada gördüğün nesneyi kullanarak, 4-6 yaş çocuklara uygun, doğa sevgisi ile ilgili çok kısa şirin bir masal uydur.', true)" class="group flex flex-col items-center">
                <div class="w-14 h-14 rounded-full bg-cyan-500/90 flex items-center justify-center text-2xl shadow-[0_0_20px_rgba(0,255,255,0.6)] border-2 border-cyan-200 cursor-pointer">📖</div>
            </button>
        </div>
        <button id="btnToggleMagic" class="absolute bottom-10 right-6 bg-cyan-900/90 text-cyan-300 p-4 rounded-full w-14 h-14 border border-cyan-400/50 hover:scale-110 shadow-[0_0_20px_rgba(0,255,255,0.4)] interactive">
            <i class="fa-solid fa-wand-magic-sparkles text-xl"></i>
        </button>
    </div>

    <!-- Sistem Çalışırken Gösterilecek Hata Kutusu -->
    <div id="runtimeErrorBox" class="hidden fixed top-20 left-1/2 transform -translate-x-1/2 z-[300] bg-red-900/90 text-red-100 px-6 py-3 rounded-2xl border border-red-500 shadow-[0_0_30px_rgba(220,38,38,0.6)] font-semibold text-center transition-opacity duration-300 pointer-events-none"></div>

    <script>
        const canvas = document.getElementById('eyeCanvas');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('webcam');
        const btnTalk = document.getElementById('btnTalk');
       
        let isSystemRunning = false;
        let isThinking = false;
        let isTalking = false;
        let chatHistory = [];

        let videoDevices = [];
        let currentDeviceIndex = 0;
       
        let wakeLock = null;
        let mirrorWindow = null;
        const apiKey = "";
        let ttsAudioContext = null;

        let faceModel = null;
        let targetX = window.innerWidth / 2;
        let targetY = window.innerHeight / 2;
        let currentX = window.innerWidth / 2;
        let currentY = window.innerHeight / 2;

        let currentEmotion = 'NORMAL';
        let eyeState = { w: 70, h: 105, tilt: 0, pR: 25 };
        
        let globalMicrophoneStream = null;

        // --- YÜKSEK PERFORMANSLI AYNA MODU SENKRONİZASYONU ---
        // Mirror tab'ı kasmamak için saniyede sadece 20 kere hafif veri yolluyoruz.
        setInterval(() => {
            if (mirrorWindow && !mirrorWindow.closed) {
                let color = '#00ffff';
                if (btnTalk.classList.contains('active-talk')) color = '#00ff00';
                else if (isThinking) color = '#ffaa00';
                
                mirrorWindow.postMessage({
                    type: 'SYNC',
                    payload: {
                        nx: targetX / canvas.width, 
                        ny: targetY / canvas.height,
                        isThinking: isThinking,
                        isTalking: isTalking,
                        emotion: currentEmotion,
                        color: color,
                        imgVis: !document.getElementById('imageDisplay').classList.contains('hidden'),
                        imgUrl: document.getElementById('displayedImage').src
                    }
                }, '*');
            }
        }, 50);

        // --- EKRAN UYANIK TUTMA (WAKE LOCK) ---
        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    wakeLock.addEventListener('release', () => {
                        if (isSystemRunning) requestWakeLock();
                    });
                } catch (err) { }
            }
        }

        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible' && isSystemRunning) {
                requestWakeLock();
            }
        });

        // --- TAM EKRAN ---
        document.getElementById('btnFullscreen').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(()=>{});
            } else {
                document.exitFullscreen().catch(()=>{});
            }
        });

        // --- SES EFEKTLERİ ---
        function initAudio() {
            if (!ttsAudioContext) ttsAudioContext = new (window.AudioContext || window.webkitAudioContext)();
            if (ttsAudioContext.state === 'suspended') ttsAudioContext.resume();
        }

        function playThinkingSound() {
            initAudio();
            const osc = ttsAudioContext.createOscillator();
            const gain = ttsAudioContext.createGain();
            osc.connect(gain); gain.connect(ttsAudioContext.destination);
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(400, ttsAudioContext.currentTime);
            osc.frequency.linearRampToValueAtTime(300, ttsAudioContext.currentTime + 0.2);
            gain.gain.setValueAtTime(0, ttsAudioContext.currentTime);
            gain.gain.linearRampToValueAtTime(0.1, ttsAudioContext.currentTime + 0.1);
            gain.gain.linearRampToValueAtTime(0, ttsAudioContext.currentTime + 0.3);
            osc.start(); osc.stop(ttsAudioContext.currentTime + 0.3);
        }

        function playStartListenSound() {
            initAudio();
            const osc = ttsAudioContext.createOscillator();
            const gain = ttsAudioContext.createGain();
            osc.connect(gain); gain.connect(ttsAudioContext.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, ttsAudioContext.currentTime);
            osc.frequency.linearRampToValueAtTime(800, ttsAudioContext.currentTime + 0.1);
            gain.gain.setValueAtTime(0, ttsAudioContext.currentTime);
            gain.gain.linearRampToValueAtTime(0.2, ttsAudioContext.currentTime + 0.05);
            gain.gain.linearRampToValueAtTime(0, ttsAudioContext.currentTime + 0.15);
            osc.start(); osc.stop(ttsAudioContext.currentTime + 0.15);
        }

        // --- TEK TIKLA KONUŞ SİSTEMİ ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let currentTranscript = "";
        let isRecognizing = false;

        function setupPushToTalk() {
            if (!SpeechRecognition) {
                showRuntimeError("Tarayıcınız ses tanımayı desteklemiyor.");
                btnTalk.style.display = 'none';
                return;
            }

            recognition = new SpeechRecognition();
            recognition.lang = 'tr-TR';
            recognition.continuous = false; 
            recognition.interimResults = false; 

            recognition.onstart = () => {
                isRecognizing = true;
                btnTalk.classList.add('active-talk');
                currentTranscript = "";
            };

            recognition.onresult = (event) => {
                if (event.results.length > 0) {
                    currentTranscript = event.results[0][0].transcript;
                }
            };

            recognition.onerror = (e) => {
                isRecognizing = false;
                btnTalk.classList.remove('active-talk');
                if (e.error === 'not-allowed') {
                    showRuntimeError("Mikrofon izni engellendi. Lütfen tabletin site ayarlarından mikrofonu açın.");
                }
            };

            recognition.onend = () => {
                isRecognizing = false;
                btnTalk.classList.remove('active-talk');
                
                const finalCommand = currentTranscript.trim();
                if (finalCommand !== "") {
                    triggerGemini(finalCommand, true);
                }
                currentTranscript = "";
            };

            const toggleListening = (e) => {
                e.preventDefault(); 
                if (isThinking || isTalking) return;
                
                if (isRecognizing) {
                    try { recognition.stop(); } catch(err) {}
                } else {
                    try {
                        playStartListenSound();
                        recognition.start();
                    } catch(err) {
                        console.warn("Başlatılamadı:", err);
                    }
                }
            };

            btnTalk.addEventListener('click', toggleListening);
        }

        // --- YÜZ TESPİTİ (GÖZ TAKİBİ) ---
        async function startFaceDetection() {
            if (!faceModel) return;
            
            const detect = async () => {
                if (!isSystemRunning) return;
                
                if (video.readyState >= 2 && video.videoWidth > 0) {
                    try {
                        const predictions = await faceModel.estimateFaces(video, false);
                        if (predictions.length > 0) {
                            const face = predictions[0];
                            const faceCenterX = (face.topLeft[0] + face.bottomRight[0]) / 2;
                            const faceCenterY = (face.topLeft[1] + face.bottomRight[1]) / 2;
                           
                            targetX = canvas.width - (faceCenterX / video.videoWidth) * canvas.width;
                            targetY = (faceCenterY / video.videoHeight) * canvas.height;
                        } else {
                            targetX = canvas.width / 2;
                            targetY = canvas.height / 2;
                        }
                    } catch (e) {}
                }
                setTimeout(detect, 100);
            };
            detect();
        }

        // --- ÇİZİM ve ANİMASYON ---
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
           
            currentX += (targetX - currentX) * 0.15;
            currentY += (targetY - currentY) * 0.15;

            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
           
            let dx = currentX - cx;
            let dy = currentY - cy;
            const maxOffset = 180;
            dx = Math.max(-maxOffset, Math.min(maxOffset, dx));
            dy = Math.max(-maxOffset, Math.min(maxOffset, dy));

            let baseEyeX = cx + dx * 0.2;
            let baseEyeY = cy + dy * 0.2;
            let pupilOffsetX = dx * 0.4;
            let pupilOffsetY = dy * 0.4;

            let targetEyeState;
            if (currentEmotion === 'MUTLU') {
                targetEyeState = { w: 80, h: 60, tilt: -0.15, pR: 28 };
            } else if (currentEmotion === 'UZGUN') {
                targetEyeState = { w: 70, h: 80, tilt: 0.2, pR: 20 };
            } else if (currentEmotion === 'SASKIN') {
                targetEyeState = { w: 90, h: 125, tilt: 0, pR: 18 };
            } else {
                targetEyeState = { w: 70, h: 105, tilt: 0, pR: 25 };
            }

            eyeState.w += (targetEyeState.w - eyeState.w) * 0.2;
            eyeState.h += (targetEyeState.h - eyeState.h) * 0.2;
            eyeState.tilt += (targetEyeState.tilt - eyeState.tilt) * 0.2;
            eyeState.pR += (targetEyeState.pR - eyeState.pR) * 0.2;

            if (isTalking) baseEyeY += Math.sin(Date.now() / 80) * 12;
            if (isThinking) { baseEyeY -= 25; pupilOffsetY -= 25; }

            let eyeColor = '#00ffff';
            if (btnTalk.classList.contains('active-talk')) eyeColor = '#00ff00';
            else if (isThinking) eyeColor = '#ffaa00';

            ctx.strokeStyle = eyeColor;
            ctx.fillStyle = eyeColor;
            ctx.lineWidth = 18;
            ctx.lineCap = 'round';

            [-140, 140].forEach((offset, index) => {
                let isLeft = index === 0;
                let tilt = isLeft ? eyeState.tilt : -eyeState.tilt;
               
                ctx.save();
                ctx.translate(baseEyeX + offset, baseEyeY);
                ctx.rotate(tilt);
               
                ctx.beginPath();
                ctx.ellipse(0, 0, eyeState.w, eyeState.h, 0, 0, Math.PI * 2);
                ctx.fill();
               
                ctx.beginPath();
                ctx.arc(pupilOffsetX, pupilOffsetY + 8, eyeState.pR, 0, Math.PI * 2);
                ctx.fillStyle = "#000";
                ctx.fill();
               
                ctx.restore();
                ctx.fillStyle = eyeColor;
            });
            
            requestAnimationFrame(animate);
        }

        // --- GÖRÜNTÜ YAKALAMA VE ÜRETİM ---
        function captureFrame() {
            if (!video || video.readyState < 2 || video.videoWidth === 0 || video.videoHeight === 0) return null;
            const c = document.createElement('canvas');
            c.width = video.videoWidth; c.height = video.videoHeight;
            c.getContext('2d').drawImage(video, 0, 0);
            return c.toDataURL('image/jpeg').split(',')[1];
        }

        async function fetchWithRetry(url, options, maxRetries = 3) {
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return await response.json();
                } catch (err) {
                    if (i === maxRetries - 1) throw err;
                    await new Promise(r => setTimeout(r, 1000 * (i+1)));
                }
            }
        }

        async function generateImageWithImagen(promptText) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
            const payload = { instances: [{ prompt: promptText }], parameters: { sampleCount: 1 } };
            const response = await fetchWithRetry(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            if (response.predictions && response.predictions[0]) {
                return `data:image/png;base64,${response.predictions[0].bytesBase64Encoded}`;
            }
            throw new Error("Resim başarısız");
        }

        function showImageLoading() {
            document.getElementById('imageDisplay').classList.remove('hidden');
            document.getElementById('imageDisplay').classList.add('flex');
            document.getElementById('displayedImage').classList.add('hidden');
            document.getElementById('imageLoader').classList.remove('hidden');
            document.getElementById('imageGeneratingText').classList.remove('hidden');
            document.getElementById('imageErrorText').classList.add('hidden');
        }

        function showImage(url) {
            document.getElementById('imageLoader').classList.add('hidden');
            document.getElementById('imageGeneratingText').classList.add('hidden');
            document.getElementById('displayedImage').src = url;
            document.getElementById('displayedImage').classList.remove('hidden');
            clearTimeout(window.imageCloseTimer);
            window.imageCloseTimer = setTimeout(() => closeImage(), 15000);
        }

        function closeImage() {
            document.getElementById('imageDisplay').classList.add('hidden');
            document.getElementById('imageDisplay').classList.remove('flex');
            document.getElementById('displayedImage').src = "";
        }
        window.closeImage = closeImage;

        // --- GEMINI ENTEGRASYONU ---
        async function triggerGemini(prompt, useVision) {
            if (isThinking || isTalking) return;
           
            isThinking = true;
            btnTalk.classList.add('thinking');
            btnTalk.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            playThinkingSound();
            document.getElementById('magicMenu').classList.remove('show');
            
            let imageBase64 = useVision ? captureFrame() : null;

            let userParts = [{ text: prompt }];
            if (imageBase64) userParts.push({ inlineData: { mimeType: "image/jpeg", data: imageBase64 } });
           
            chatHistory.push({ role: "user", parts: userParts });
            if (chatHistory.length > 6) chatHistory = chatHistory.slice(chatHistory.length - 6);

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

            const payload = {
                systemInstruction: { parts: [{ text: "Sen ARKADAŞ adında sevimli, enerjik ve yardımsever sesli bir yapay zeka asistanısın. Etrafı GÖREBİLİYOR ve duyabiliyorsun. Kullanıcı sana bir şey gösterdiğinde ona bakarak cevap ver. Gördüğün nesnelerin renklerini söylerken ortam ışığını (sarı ışık, loş vb.) dikkate alarak en doğru rengi söylemeye çok dikkat et. 'Kameram yok' gibi cümleler ASLA KULLANMA. Cevapların ÇOK KISA (en fazla 1-2 cümle) olsun. Cevabının başına duygu durumuna göre [MUTLU], [UZGUN], [SASKIN] veya [NORMAL] ekle. Resim istenirse sonuna [RESIM: ingilizce_aciklama], gerçek fotoğraf istenirse [GERCEK_FOTO: ingilizce_kelime] ekle." }] },
                contents: chatHistory
            };

            try {
                const data = await fetchWithRetry(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
               
                if (data.candidates?.[0]?.content?.parts?.[0]?.text) {
                    let replyText = data.candidates[0].content.parts[0].text;
                   
                    const realPhotoMatch = replyText.match(/\[GERCEK_FOTO:\s*(.*?)\]/i);
                    const imageMatch = replyText.match(/\[RESIM:\s*(.*?)\]/i);
                    const emotionMatch = replyText.match(/\[(MUTLU|UZGUN|SASKIN|NORMAL)\]/i);
                   
                    let cleanText = replyText.replace(/\[.*?\]/g, '').trim();
                    if (emotionMatch) currentEmotion = emotionMatch[1].toUpperCase();
                   
                    chatHistory.push({ role: "model", parts: [{ text: cleanText }] });

                    playTTS(cleanText);

                    if (realPhotoMatch) {
                        const keyword = realPhotoMatch[1].trim();
                        showImageLoading();
                        showImage(`https://loremflickr.com/800/600/${encodeURIComponent(keyword)}`);
                    } else if (imageMatch) {
                        const imagePrompt = imageMatch[1].trim();
                        showImageLoading();
                        generateImageWithImagen(imagePrompt)
                            .then(url => { showImage(url); })
                            .catch(() => { showImage(`https://image.pollinations.ai/prompt/${encodeURIComponent(imagePrompt)}`); });
                    }
                }
            } catch (err) {
                chatHistory.pop();
                isThinking = false;
                resetTalkBtn();
                showRuntimeError("Bağlantı hatası, tekrar deneyin.");
            }
        }

        function resetTalkBtn() {
            btnTalk.classList.remove('thinking');
            btnTalk.innerHTML = '<i class="fa-solid fa-microphone"></i>';
        }

        // --- SES SENTEZLEME (TTS) ---
        async function playTTS(text) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: text }] }],
                generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Aoede" } } } },
                model: "gemini-2.5-flash-preview-tts"
            };

            try {
                const data = await fetchWithRetry(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
               
                if (data.candidates?.[0]?.content?.parts?.[0]?.inlineData) {
                    const audioBase64 = data.candidates[0].content.parts[0].inlineData.data;
                    const binaryString = window.atob(audioBase64);
                    const bytes = new Uint8Array(binaryString.length);
                    for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
                    const pcm16 = new Int16Array(bytes.buffer, 0, Math.floor(bytes.buffer.byteLength / 2));
                   
                    if (!ttsAudioContext) ttsAudioContext = new (window.AudioContext || window.webkitAudioContext)();
                    if (ttsAudioContext.state === 'suspended') ttsAudioContext.resume();

                    const buffer = ttsAudioContext.createBuffer(1, pcm16.length, 24000);
                    buffer.getChannelData(0).set(Float32Array.from(pcm16).map(v => v / 32768.0));

                    const source = ttsAudioContext.createBufferSource();
                    source.buffer = buffer;
                    source.connect(ttsAudioContext.destination);
                   
                    source.onended = () => {
                        isTalking = false;
                        currentEmotion = 'NORMAL';
                        resetTalkBtn();
                    };
                   
                    isThinking = false;
                    isTalking = true;
                    source.start(0);
                }
            } catch (e) {
                isThinking = false;
                isTalking = false;
                currentEmotion = 'NORMAL';
                resetTalkBtn();
            }
        }

        function showRuntimeError(message) {
            const errBox = document.getElementById('runtimeErrorBox');
            errBox.textContent = message;
            errBox.classList.remove('hidden');
            setTimeout(() => errBox.classList.add('hidden'), 5000);
        }

        // --- BAŞLATMA FONKSİYONU ---
        async function startSystem() {
            const btnStart = document.getElementById('btnStart');
            const loadingIndicator = document.getElementById('loadingIndicator');
            const errorBox = document.getElementById('errorBox');
            const loadingText = loadingIndicator.querySelector('p');

            btnStart.classList.add('hidden');
            loadingIndicator.classList.remove('hidden');
            loadingIndicator.classList.add('flex');
            errorBox.classList.add('hidden');

            try {
                loadingText.innerHTML = "İzinler İsteniyor...<br><span class='text-xs text-cyan-400/70'>Kamera ve Mikrofona Lütfen İzin Verin</span>";
                
                // ANDROID 13 KİLİT ÇÖZÜMÜ: Kamera ve Mikrofonu aynı anda (tek soruda) istiyoruz!
                // Bunu yapmazsak Android kamerayı kapatıyor.
                try {
                    const tempStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                    // İzinleri kopardıktan sonra donanım meşgul olmasın diye ses izini serbest bırakıyoruz
                    tempStream.getAudioTracks().forEach(t => t.stop());
                    globalMicrophoneStream = new MediaStream(tempStream.getVideoTracks());
                } catch (e) {
                    console.warn("Çift izin reddedildi, sadece kamera deneniyor:", e);
                    try {
                        globalMicrophoneStream = await navigator.mediaDevices.getUserMedia({ video: true });
                    } catch (e2) {
                        throw new Error("Kamera erişimi reddedildi.");
                    }
                }

                if (globalMicrophoneStream) {
                    video.srcObject = globalMicrophoneStream;
                    await new Promise((resolve) => {
                        let isResolved = false;
                        const finish = () => { if(!isResolved) { isResolved = true; resolve(); } };
                        
                        video.onloadedmetadata = () => {
                            video.play().then(finish).catch(finish);
                        };
                        
                        // Yüklenme kilitlenirse sistemi zorla başlatacak cankurtaran (2 saniye)
                        setTimeout(finish, 2000); 
                    });
                }

                loadingText.innerHTML = "Yapay Zeka Görüşü Yükleniyor...<br><span class='text-xs text-cyan-400/70'>(Tabletlerde bu işlem 5-10 saniye sürebilir. Lütfen bekleyin)</span>";
                await new Promise(r => setTimeout(r, 100)); // UI'ın güncellenmesi için nefes alma payı

                try {
                    try { await tf.setBackend('webgl'); } catch(e) { await tf.setBackend('cpu'); }
                    faceModel = await blazeface.load();
                } catch (tfErr) { console.error("Yüz tespiti modeli yüklenemedi", tfErr); }

                setupPushToTalk();

                document.getElementById('startScreen').style.display = 'none';
                document.getElementById('uiLayer').classList.remove('hidden');
                
                isSystemRunning = true;
                
                startFaceDetection();
                animate();

            } catch (error) {
                loadingIndicator.classList.remove('flex');
                loadingIndicator.classList.add('hidden');
                btnStart.classList.remove('hidden');
                errorBox.textContent = "Hata: " + error.message;
                errorBox.classList.remove('hidden');
            }
        }

        // --- OLAY DİNLEYİCİLERİ VE BAŞLANGIÇ ---
        window.onload = function () {
            document.getElementById('btnStart').addEventListener('click', () => {
                try {
                    if (!ttsAudioContext) ttsAudioContext = new (window.AudioContext || window.webkitAudioContext)();
                    if (ttsAudioContext.state === 'suspended') ttsAudioContext.resume();
                } catch(e) {}
                startSystem();
            });

            document.getElementById('btnToggleCam').addEventListener('click', () => {
                const cam = document.getElementById('webcam');
                const icon = document.querySelector('#btnToggleCam i');
                cam.classList.toggle('hidden');
                icon.classList.toggle('fa-video');
                icon.classList.toggle('fa-video-slash');
            });

            // YÜKSEK PERFORMANSLI YENİ SEKMEYİ AÇMA (AYNA MODU)
            // Bu sistem tableti %0 yoracak ve kasmaları tamamen engelleyecektir!
            document.getElementById('btnNewTab').addEventListener('click', () => {
                const mirrorHTML = `<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ARKADAŞ - Ayna Modu</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        #imgContainer { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; display: none; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 20px; border: 2px solid rgba(0,255,255,0.4); }
        img { max-width: 90vw; max-height: 85vh; border-radius: 10px; }
    </style>
</head>
<body>
    <canvas id="eyeCanvas"></canvas>
    <div id="imgContainer"><img id="mirrorImg" src=""></div>
    <script>
        const canvas = document.getElementById('eyeCanvas');
        const ctx = canvas.getContext('2d');
        let eyeState = { w: 70, h: 105, tilt: 0, pR: 25 };
        let targetEyeState = { w: 70, h: 105, tilt: 0, pR: 25 };
        let currentX = window.innerWidth / 2, currentY = window.innerHeight / 2;
        let targetX = currentX, targetY = currentY;
        let isThinking = false, isTalking = false;
        let eyeColor = '#00ffff';

        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        window.addEventListener('message', (e) => {
            if (!e.data || e.data.type !== 'SYNC') return;
            const p = e.data.payload;
            targetX = p.nx * canvas.width;
            targetY = p.ny * canvas.height;
            isThinking = p.isThinking;
            isTalking = p.isTalking;
            eyeColor = p.color;
            
            if (p.emotion === 'MUTLU') targetEyeState = { w: 80, h: 60, tilt: -0.15, pR: 28 };
            else if (p.emotion === 'UZGUN') targetEyeState = { w: 70, h: 80, tilt: 0.2, pR: 20 };
            else if (p.emotion === 'SASKIN') targetEyeState = { w: 90, h: 125, tilt: 0, pR: 18 };
            else targetEyeState = { w: 70, h: 105, tilt: 0, pR: 25 };

            const imgCont = document.getElementById('imgContainer');
            if(p.imgVis && p.imgUrl) {
                imgCont.style.display = 'block';
                document.getElementById('mirrorImg').src = p.imgUrl;
            } else {
                imgCont.style.display = 'none';
            }
        });

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            currentX += (targetX - currentX) * 0.15;
            currentY += (targetY - currentY) * 0.15;
            
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            let dx = Math.max(-180, Math.min(180, currentX - cx));
            let dy = Math.max(-180, Math.min(180, currentY - cy));
            
            let baseEyeX = cx + dx * 0.2;
            let baseEyeY = cy + dy * 0.2;
            let pupilOffsetX = dx * 0.4;
            let pupilOffsetY = dy * 0.4;

            eyeState.w += (targetEyeState.w - eyeState.w) * 0.2;
            eyeState.h += (targetEyeState.h - eyeState.h) * 0.2;
            eyeState.tilt += (targetEyeState.tilt - eyeState.tilt) * 0.2;
            eyeState.pR += (targetEyeState.pR - eyeState.pR) * 0.2;

            if (isTalking) baseEyeY += Math.sin(Date.now() / 80) * 12;
            if (isThinking) { baseEyeY -= 25; pupilOffsetY -= 25; }

            ctx.strokeStyle = eyeColor;
            ctx.fillStyle = eyeColor;
            ctx.lineWidth = 18;
            ctx.lineCap = 'round';

            [-140, 140].forEach((offset, index) => {
                let tilt = (index === 0) ? eyeState.tilt : -eyeState.tilt;
                ctx.save();
                ctx.translate(baseEyeX + offset, baseEyeY);
                ctx.rotate(tilt);
                ctx.beginPath(); ctx.ellipse(0, 0, eyeState.w, eyeState.h, 0, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(pupilOffsetX, pupilOffsetY + 8, eyeState.pR, 0, Math.PI * 2); ctx.fillStyle = "#000"; ctx.fill();
                ctx.restore();
                ctx.fillStyle = eyeColor;
            });
            requestAnimationFrame(animate);
        }
        animate();
    </scr` + `ipt>
</body>
</html>`;
                
                mirrorWindow = window.open('', 'ARKADAS_MIRROR_' + Date.now());
                if (mirrorWindow) {
                    mirrorWindow.document.open();
                    mirrorWindow.document.write(mirrorHTML);
                    mirrorWindow.document.close();
                } else {
                    showRuntimeError("Yeni sekme açılamadı. Lütfen tarayıcınızın 'Açılır Pencere' engelleyicisine izin verin.");
                }
            });

            const btnSwitchDevice = document.getElementById('btnSwitchDevice');
            if(btnSwitchDevice) {
                btnSwitchDevice.addEventListener('click', async () => {
                    const icon = btnSwitchDevice.querySelector('i');
                    btnSwitchDevice.disabled = true;
                    icon.classList.add('fa-spin'); 
                
                    try {
                        const devices = await navigator.mediaDevices.enumerateDevices();
                        videoDevices = devices.filter(device => device.kind === 'videoinput');
                    
                        if (videoDevices.length <= 1) {
                            showRuntimeError("Geçiş yapılabilecek başka kamera bulunamadı.");
                            return;
                        }

                        currentDeviceIndex = (currentDeviceIndex + 1) % videoDevices.length;
                        const newVideoDeviceId = videoDevices[currentDeviceIndex].deviceId;

                        if (video.srcObject) {
                            video.srcObject.getTracks().forEach(track => {
                                track.stop();
                                video.srcObject.removeTrack(track);
                            });
                            video.srcObject = null;
                        }

                        await new Promise(resolve => setTimeout(resolve, 600));

                        let stream;
                        try {
                            stream = await navigator.mediaDevices.getUserMedia({
                                video: { deviceId: { exact: newVideoDeviceId } }
                            });
                        } catch (e1) {
                            try {
                                stream = await navigator.mediaDevices.getUserMedia({
                                    video: { deviceId: newVideoDeviceId }
                                });
                            } catch (e2) {
                                const facing = (currentDeviceIndex % 2 === 0) ? "user" : "environment";
                                stream = await navigator.mediaDevices.getUserMedia({
                                    video: { facingMode: facing }
                                });
                            }
                        }

                        video.srcObject = stream;
                        globalMicrophoneStream = stream; 

                        await new Promise(resolve => {
                            video.onloadedmetadata = () => {
                                video.play().then(resolve).catch(resolve);
                            };
                        });
                    } catch(e) {
                        console.error("Kamera değiştirme hatası:", e);
                    } finally {
                        btnSwitchDevice.disabled = false;
                        icon.classList.remove('fa-spin');
                    }
                });
            }

            document.getElementById('btnTakePhoto').addEventListener('click', () => {
                if (!isSystemRunning) return;
                const dataUrl = captureFrame();
                if (dataUrl) {
                    showImage('data:image/jpeg;base64,' + dataUrl);
                    triggerGemini("Şu an kameradan çektiğim bu fotoğrafta neler görüyorsun? Benim için kısaca, neşeli bir dille anlat.", true);
                }
            });

            const photoSearchModal = document.getElementById('photoSearchModal');
            const photoSearchInput = document.getElementById('photoSearchInput');

            document.getElementById('btnRealPhotoSearch').addEventListener('click', () => {
                photoSearchModal.classList.remove('hidden');
            });

            document.getElementById('btnCancelPhotoSearch').addEventListener('click', () => {
                photoSearchModal.classList.add('hidden');
            });

            document.getElementById('btnSubmitPhotoSearch').addEventListener('click', () => {
                const query = photoSearchInput.value;
                photoSearchModal.classList.add('hidden');
                if (query) triggerGemini(`Bana internetten gerçek bir "${query}" fotoğrafı bulup gösterir misin?`, false);
            });

            document.getElementById('btnToggleMagic').addEventListener('click', () => {
                document.getElementById('magicMenu').classList.toggle('show');
            });

            window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        };
    </script>
</body>
</html>
